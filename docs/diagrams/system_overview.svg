<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 530" width="950" height="530">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; }
    </style>
    <!-- Dashed pattern for WiFi zone border -->
  </defs>

  <!-- Background -->
  <rect width="950" height="530" fill="#f0f0f0"/>

  <!-- Title -->
  <text x="475" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">
    NY&amp;E Northern Lights Subdivision — Layout Control System Overview
  </text>

  <!-- ============================================================ -->
  <!-- ROW 1: Dispatcher (HDMI) and RPi5 Server                     -->
  <!-- ============================================================ -->

  <!-- Dispatcher Monitor -->
  <rect x="5" y="35" width="170" height="130" rx="6" fill="#1b5e20" stroke="#0a3d0a" stroke-width="2"/>
  <text x="90" y="56" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Dispatcher</text>
  <text x="90" y="70" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Monitor</text>
  <line x1="15" y1="76" x2="165" y2="76" stroke="white" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="90" y="91" text-anchor="middle" font-size="9" fill="#a5d6a7">Full-screen web app</text>
  <text x="90" y="105" text-anchor="middle" font-size="9" fill="#a5d6a7">RPi5 Display 1 (HDMI)</text>
  <text x="90" y="119" text-anchor="middle" font-size="9" fill="#a5d6a7">Dispatcher's room</text>
  <text x="90" y="133" text-anchor="middle" font-size="8" fill="#81c784">OS log · TO issuance</text>
  <text x="90" y="147" text-anchor="middle" font-size="8" fill="#81c784">Clearances · Signal arms</text>

  <!-- HDMI connection line -->
  <line x1="175" y1="100" x2="190" y2="100" stroke="#333" stroke-width="2.5"/>
  <polygon points="186,96 192,100 186,104" fill="#333"/>
  <text x="183" y="94" text-anchor="middle" font-size="7" fill="#555">HDMI</text>

  <!-- RPi5 Central Server -->
  <rect x="192" y="35" width="580" height="130" rx="8" fill="#1565c0" stroke="#0d3f8a" stroke-width="2"/>
  <text x="482" y="57" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Central Server — Raspberry Pi 5</text>
  <line x1="202" y1="63" x2="762" y2="63" stroke="white" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- Services in two columns inside server -->
  <text x="230" y="81" font-size="10" fill="#90caf9">▸ WiFi Access Point — SSID: NYE_Layout</text>
  <text x="230" y="96" font-size="10" fill="#90caf9">▸ MQTT Broker (Mosquitto :1883)</text>
  <text x="230" y="111" font-size="10" fill="#90caf9">▸ Fast Clock Service (rr-clock)</text>
  <text x="230" y="126" font-size="10" fill="#90caf9">▸ Dispatcher Web App (FastAPI :5000)</text>
  <text x="230" y="141" font-size="10" fill="#90caf9">▸ JMRI — WiThrottle :12090 · Web :8080</text>
  <text x="550" y="81" font-size="10" fill="#bbdefb">Display 1 → Dispatcher room (HDMI)</text>
  <text x="550" y="96" font-size="10" fill="#bbdefb">Display 2 → Camera grid (Phase 3)</text>
  <text x="550" y="111" font-size="10" fill="#bbdefb">Ethernet → home LAN (maintenance)</text>
  <text x="550" y="126" font-size="10" fill="#bbdefb">DHCP: 192.168.10.10 – .99</text>
  <text x="550" y="141" font-size="10" fill="#bbdefb">LocoNet/USB (PR3) → DCS51</text>

  <!-- ============================================================ -->
  <!-- WiFi Zone — contains all WiFi clients                        -->
  <!-- ============================================================ -->

  <!-- WiFi zone rectangle -->
  <rect x="5" y="172" width="940" height="275" rx="8"
        fill="#e8f4fd" stroke="#7bafd4" stroke-width="1.5" stroke-dasharray="8,4"/>

  <!-- WiFi zone label -->
  <text x="475" y="190" text-anchor="middle" font-size="11" fill="#1565c0" font-style="italic">
    WiFi Network — NYE_Layout · 192.168.10.x · All devices communicate via MQTT
  </text>

  <!-- Server to WiFi zone connection -->
  <line x1="482" y1="165" x2="482" y2="172" stroke="#1565c0" stroke-width="2" stroke-dasharray="4,2"/>
  <polygon points="478,169 482,175 486,169" fill="#1565c0"/>

  <!-- ============================================================ -->
  <!-- ROW 2: Seven Station CYD Units (within WiFi zone)            -->
  <!-- Station box: width=115, gap=10, start=42                     -->
  <!-- Centers: WP=99  XP=224  BB=349  JC=474  MC=599  SK=724  HC=849 -->
  <!-- ============================================================ -->

  <!-- WP — South Terminus -->
  <rect x="42" y="198" width="115" height="100" rx="5" fill="#4e342e" stroke="#3e2723" stroke-width="2"/>
  <text x="99" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="white">WP</text>
  <text x="99" y="232" text-anchor="middle" font-size="8.5" fill="#ffccbc">Williamsport</text>
  <text x="99" y="246" text-anchor="middle" font-size="8" fill="#ffccbc">ESP32 CYD</text>
  <text x="99" y="259" text-anchor="middle" font-size="7.5" fill="#ffccbc">South Terminus</text>
  <text x="99" y="271" text-anchor="middle" font-size="7.5" fill="#ffccbc">C&amp;O Junction</text>
  <text x="99" y="285" text-anchor="middle" font-size="8" fill="#ff8a65">Clearance</text>
  <text x="99" y="294" text-anchor="middle" font-size="7" fill="#ffab91">OS · Orders</text>

  <!-- XP — Register Station (not a switchback) -->
  <rect x="167" y="198" width="115" height="100" rx="5" fill="#1a237e" stroke="#0d1557" stroke-width="2"/>
  <text x="224" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="white">XP</text>
  <text x="224" y="232" text-anchor="middle" font-size="8.5" fill="#c5cae9">Xina Pass</text>
  <text x="224" y="246" text-anchor="middle" font-size="8" fill="#c5cae9">ESP32 CYD</text>
  <text x="224" y="259" text-anchor="middle" font-size="7.5" fill="#c5cae9">Register Station</text>
  <text x="224" y="271" text-anchor="middle" font-size="7.5" fill="#c5cae9"> </text>
  <text x="224" y="285" text-anchor="middle" font-size="8" fill="#ff8a65">TO Signal · CL</text>
  <text x="224" y="294" text-anchor="middle" font-size="7" fill="#ffab91">OS · Orders</text>

  <!-- BB — Switchback with TO Signal -->
  <rect x="292" y="198" width="115" height="100" rx="5" fill="#2e7d32" stroke="#1b5e20" stroke-width="2"/>
  <text x="349" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="white">BB  ↺</text>
  <text x="349" y="232" text-anchor="middle" font-size="8.5" fill="#c8e6c9">Becs Bend</text>
  <text x="349" y="246" text-anchor="middle" font-size="8" fill="#c8e6c9">ESP32 CYD</text>
  <text x="349" y="259" text-anchor="middle" font-size="7.5" fill="#c8e6c9">Standard Station</text>
  <text x="349" y="271" text-anchor="middle" font-size="7.5" fill="#c8e6c9">↺ Switchback</text>
  <text x="349" y="285" text-anchor="middle" font-size="8" fill="#ff8a65">TO Signal</text>
  <text x="349" y="294" text-anchor="middle" font-size="7" fill="#a5d6a7">OS · Orders</text>

  <!-- JC — Switchback with TO Signal -->
  <rect x="417" y="198" width="115" height="100" rx="5" fill="#2e7d32" stroke="#1b5e20" stroke-width="2"/>
  <text x="474" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="white">JC  ↺</text>
  <text x="474" y="232" text-anchor="middle" font-size="8.5" fill="#c8e6c9">Jacks Creek</text>
  <text x="474" y="246" text-anchor="middle" font-size="8" fill="#c8e6c9">ESP32 CYD</text>
  <text x="474" y="259" text-anchor="middle" font-size="7.5" fill="#c8e6c9">Standard Station</text>
  <text x="474" y="271" text-anchor="middle" font-size="7.5" fill="#c8e6c9">↺ Switchback</text>
  <text x="474" y="285" text-anchor="middle" font-size="8" fill="#ff8a65">TO Signal</text>
  <text x="474" y="294" text-anchor="middle" font-size="7" fill="#a5d6a7">OS · Orders</text>

  <!-- MC — Standard with TO Signal + Switchback -->
  <rect x="542" y="198" width="115" height="100" rx="5" fill="#2e7d32" stroke="#1b5e20" stroke-width="2"/>
  <text x="599" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="white">MC  ↺</text>
  <text x="599" y="232" text-anchor="middle" font-size="8.5" fill="#c8e6c9">Michelles Cove</text>
  <text x="599" y="246" text-anchor="middle" font-size="8" fill="#c8e6c9">ESP32 CYD</text>
  <text x="599" y="259" text-anchor="middle" font-size="7.5" fill="#c8e6c9">Standard Station</text>
  <text x="599" y="271" text-anchor="middle" font-size="7.5" fill="#c8e6c9">↺ Switchback</text>
  <text x="599" y="285" text-anchor="middle" font-size="8" fill="#ff8a65">TO Signal</text>
  <text x="599" y="294" text-anchor="middle" font-size="7" fill="#a5d6a7">OS · Orders</text>

  <!-- SK — Switchback with TO Signal -->
  <rect x="667" y="198" width="115" height="100" rx="5" fill="#2e7d32" stroke="#1b5e20" stroke-width="2"/>
  <text x="724" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="white">SK  ↺</text>
  <text x="724" y="232" text-anchor="middle" font-size="8.5" fill="#c8e6c9">Stans Knob</text>
  <text x="724" y="246" text-anchor="middle" font-size="8" fill="#c8e6c9">ESP32 CYD</text>
  <text x="724" y="259" text-anchor="middle" font-size="7.5" fill="#c8e6c9">Standard Station</text>
  <text x="724" y="271" text-anchor="middle" font-size="7.5" fill="#c8e6c9">↺ Switchback</text>
  <text x="724" y="285" text-anchor="middle" font-size="8" fill="#ff8a65">TO Signal</text>
  <text x="724" y="294" text-anchor="middle" font-size="7" fill="#a5d6a7">OS · Orders</text>

  <!-- HC — North Terminus -->
  <rect x="792" y="198" width="115" height="100" rx="5" fill="#4e342e" stroke="#3e2723" stroke-width="2"/>
  <text x="849" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="white">HC</text>
  <text x="849" y="232" text-anchor="middle" font-size="8.5" fill="#ffccbc">Hemlock Crest</text>
  <text x="849" y="246" text-anchor="middle" font-size="8" fill="#ffccbc">ESP32 CYD</text>
  <text x="849" y="259" text-anchor="middle" font-size="7.5" fill="#ffccbc">North Terminus</text>
  <text x="849" y="271" text-anchor="middle" font-size="7.5" fill="#ffccbc">Register Station</text>
  <text x="849" y="285" text-anchor="middle" font-size="8" fill="#ff8a65">Clearance</text>
  <text x="849" y="294" text-anchor="middle" font-size="7" fill="#ffab91">OS · Orders</text>

  <!-- ============================================================ -->
  <!-- ROW 3: YM Terminal, Engineer Phones, Owner, DCS51            -->
  <!-- ============================================================ -->

  <!-- Yardmaster Terminal -->
  <rect x="15" y="320" width="205" height="115" rx="6" fill="#e65100" stroke="#bf360c" stroke-width="2"/>
  <text x="117" y="341" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Yardmaster Terminal</text>
  <line x1="25" y1="347" x2="210" y2="347" stroke="white" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="117" y="362" text-anchor="middle" font-size="9" fill="#ffccbc">RPi3 + ELECROW 7" Touchscreen</text>
  <text x="117" y="376" text-anchor="middle" font-size="9" fill="#ffccbc">Chromium kiosk → /yard</text>
  <text x="117" y="390" text-anchor="middle" font-size="9" fill="#ffccbc">WP yard limits only</text>
  <text x="117" y="404" text-anchor="middle" font-size="8" fill="#ffe0b2">Construct · Deconstruct consists</text>
  <text x="117" y="418" text-anchor="middle" font-size="8" fill="#ffe0b2">C&amp;O interchange at INTX track</text>
  <text x="117" y="430" text-anchor="middle" font-size="7.5" fill="#ffccbc">[In development — Phase 2.0]</text>

  <!-- Engineer Phones -->
  <rect x="232" y="320" width="195" height="115" rx="6" fill="#37474f" stroke="#263238" stroke-width="2"/>
  <text x="329" y="341" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Engineer Phones</text>
  <line x1="242" y1="347" x2="417" y2="347" stroke="white" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="329" y="362" text-anchor="middle" font-size="9" fill="#b0bec5">Engine Driver App</text>
  <text x="329" y="376" text-anchor="middle" font-size="9" fill="#b0bec5">WiThrottle → JMRI :12090</text>
  <text x="329" y="390" text-anchor="middle" font-size="9" fill="#b0bec5">DCC locomotive control</text>
  <text x="329" y="404" text-anchor="middle" font-size="8" fill="#90a4ae">One per train crew</text>
  <text x="329" y="418" text-anchor="middle" font-size="8" fill="#90a4ae">Android or iOS</text>

  <!-- Owner Monitor -->
  <rect x="440" y="320" width="195" height="115" rx="6" fill="#4a4a4a" stroke="#222" stroke-width="2"/>
  <text x="537" y="341" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Owner Monitor</text>
  <line x1="450" y1="347" x2="625" y2="347" stroke="white" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="537" y="362" text-anchor="middle" font-size="9" fill="#bdbdbd">Any device on WiFi</text>
  <text x="537" y="376" text-anchor="middle" font-size="9" fill="#bdbdbd">Phone, laptop, tablet</text>
  <text x="537" y="390" text-anchor="middle" font-size="9" fill="#bdbdbd">System health + status</text>
  <text x="537" y="404" text-anchor="middle" font-size="8" fill="#9e9e9e">No live op controls</text>
  <text x="537" y="418" text-anchor="middle" font-size="8" fill="#9e9e9e">Post-session reports</text>

  <!-- DCS51 DCC Command Station -->
  <rect x="725" y="320" width="210" height="115" rx="6" fill="#b71c1c" stroke="#7f0000" stroke-width="2"/>
  <text x="830" y="341" text-anchor="middle" font-size="11" font-weight="bold" fill="white">DCC — Digitrax DCS51</text>
  <line x1="735" y1="347" x2="925" y2="347" stroke="white" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="830" y="362" text-anchor="middle" font-size="9" fill="#ffcdd2">Command Station + Booster</text>
  <text x="830" y="376" text-anchor="middle" font-size="9" fill="#ffcdd2">LocoNet → PR3 USB → JMRI</text>
  <text x="830" y="390" text-anchor="middle" font-size="9" fill="#ffcdd2">DCC track power — NYE main</text>
  <text x="830" y="404" text-anchor="middle" font-size="8" fill="#ef9a9a">Traction only — not IoT/MQTT</text>
  <text x="830" y="418" text-anchor="middle" font-size="8" fill="#ef9a9a">Wired connection to RPi5</text>

  <!-- ============================================================ -->
  <!-- DCS51 Wired Connection to RPi5 (right-side routing)         -->
  <!-- ============================================================ -->
  <!-- Route: DCS51 right side (x=935) → up to y=22 → left to server right (x=772) → down to server -->
  <line x1="935" y1="320" x2="935" y2="22" stroke="#7f0000" stroke-width="2"/>
  <line x1="772" y1="22" x2="935" y2="22" stroke="#7f0000" stroke-width="2"/>
  <line x1="772" y1="22" x2="772" y2="35" stroke="#7f0000" stroke-width="2"/>
  <polygon points="768,32 772,40 776,32" fill="#7f0000"/>
  <text x="855" y="16" text-anchor="middle" font-size="8.5" fill="#7f0000" font-style="italic">LocoNet / USB (PR3) — wired</text>

  <!-- ============================================================ -->
  <!-- Legend                                                       -->
  <!-- ============================================================ -->
  <rect x="5" y="447" width="940" height="75" rx="4" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="475" y="463" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Legend</text>

  <!-- WiFi zone description -->
  <rect x="15" y="470" width="12" height="10" rx="2" fill="#e8f4fd" stroke="#7bafd4" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="33" y="480" font-size="9" fill="#333">WiFi network zone — all devices communicate via MQTT over 192.168.10.x</text>

  <!-- Wired line -->
  <line x1="15" y1="495" x2="40" y2="495" stroke="#7f0000" stroke-width="2"/>
  <text x="47" y="499" font-size="9" fill="#333">Wired connection (LocoNet / USB / HDMI)</text>

  <!-- Station types -->
  <rect x="280" y="468" width="12" height="10" rx="2" fill="#4e342e" stroke="#3e2723" stroke-width="1"/>
  <text x="298" y="478" font-size="9" fill="#333">Terminus station</text>

  <rect x="400" y="468" width="12" height="10" rx="2" fill="#1a237e" stroke="#0d1557" stroke-width="1"/>
  <text x="418" y="478" font-size="9" fill="#333">Register station</text>

  <rect x="515" y="468" width="12" height="10" rx="2" fill="#2e7d32" stroke="#1b5e20" stroke-width="1"/>
  <text x="533" y="478" font-size="9" fill="#333">Standard station (with TO signal arms)</text>

  <text x="280" y="499" font-size="9" fill="#333">↺  Switchback — crew must swap engine/caboose ends at this station</text>

  <!-- Phase note -->
  <text x="475" y="514" text-anchor="middle" font-size="8.5" fill="#666" font-style="italic">
    Phases 1–2 complete (infrastructure, station OS, TO orders, clearances, signal arms).
    YM terminal software in development (Phase 2.0). Phases 3–6 planned (cameras, RFID, lighting, dispatcher assist).
  </text>
</svg>
